<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>$title$</title>
  $if(subtitle)$<meta name="description" content="$subtitle$" />$endif$
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/theme-dark.css" />
</head>
<body>
  <div class="rk-container">
    <header class="rk-header">
      <h1 class="rk-title">$title$</h1>
      $if(subtitle)$<p class="rk-subtitle">$subtitle$</p>$endif$
    </header>

    <main class="rk-content">
      $body$
    </main>

$if(asset-meta)$
    <aside class="rk-meta-section">
      <h3 class="rk-meta-title">Metadata</h3>
      <pre class="rk-meta-block"><code>$asset-meta$</code></pre>
    </aside>
$endif$

    <footer class="rk-footer">
      <p>Rendered with <strong>rotkeeper</strong> on $date$</p>
    </footer>
  </div>
</body>
</html>
