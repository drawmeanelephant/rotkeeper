<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>$title$</title>
  <meta name="description" content="$subtitle$" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/rotkeeper.css" />
</head>
<body class="rk-page rk-page--blog">
  <main class="rk-shell">
    <header class="rk-header">
      <h1>$title$</h1>
      <p class="rk-subtitle">$subtitle$</p>
    </header>

    <article class="rk-article">
      $body$
    </article>

$if(asset-meta)$
    <aside class="rk-meta">
      <h2>Asset Metadata</h2>
      <pre>$asset-meta$</pre>
    </aside>
$endif$

    <footer class="rk-footer">
      <p>Rendered with <code>rotkeeper</code> at $date$</p>
    </footer>

$if(sora-prompt)$
    <section class="rk-sora">
      <p>$sora-prompt$</p>
    </section>
$endif$
  </main>
</body>
</html>
